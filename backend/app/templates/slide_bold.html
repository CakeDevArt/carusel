<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
{{ base_css }}

.bold-slide .slide-body {
    padding: {{ padding }}px;
    justify-content: {{ 'flex-start' if align_v == 'top' else ('center' if align_v == 'center' else 'flex-end') }};
    text-align: {{ align_h }};
}

.bold-slide .slide-title {
    font-size: 72px;
    font-weight: 900;
    margin-bottom: 40px;
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #ff6b35;
}

.bold-slide .slide-text {
    font-size: 40px;
    line-height: 1.5;
    font-weight: 500;
    color: #fff;
}

.bold-slide .slide-footer-text {
    font-size: 30px;
    color: #ff6b35;
    margin-top: 32px;
    font-weight: 700;
    text-transform: uppercase;
}

.bold-slide .slide-header {
    color: #ff6b35 !important;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
}
</style>
</head>
<body>
<div class="slide bold-slide">
    <div class="slide-bg" style="background-color: {{ bg_color if bg_color != '#ffffff' else '#1a1a2e' }};">
        {% if bg_image_b64 %}
        <img class="slide-bg-image" src="{{ bg_image_b64 }}" />
        {% endif %}
        <div class="slide-bg-dim" style="background: rgba(0,0,0,{{ bg_dim if bg_dim > 0 else 0.5 }});"></div>
    </div>
    <div class="slide-content">
        {% if header_enabled and header_text %}
        <div class="slide-header" style="text-align: {{ align_h }};">{{ header_text }}</div>
        {% endif %}
        <div class="slide-body">
            <div class="slide-title">{{ slide.title }}</div>
            <div class="slide-text">{{ slide.body }}</div>
            {% if slide.footer %}
            <div class="slide-footer-text">{{ slide.footer }}</div>
            {% endif %}
        </div>
        {% if footer_enabled and footer_text %}
        <div class="slide-footer" style="text-align: {{ align_h }}; color: #ff6b35;">{{ footer_text }}</div>
        {% endif %}
    </div>
    <div class="slide-number" style="color: #666;">{{ slide_index }}/{{ total_slides }}</div>
</div>
</body>
</html>
