services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carousel}
      POSTGRES_USER: ${POSTGRES_USER:-carousel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5490}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carousel}"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "${MINIO_PORT:-9090}:9000"
      - "${MINIO_CONSOLE_PORT:-9091}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio_init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$S3_ACCESS_KEY\" \"$$S3_SECRET_KEY\" &&
      mc mb --ignore-existing local/carousels &&
      mc anonymous set download local/carousels &&
      echo 'Bucket created'
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8090}:8000"
    env_file:
      - .env
    environment:
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-carousel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-carousel}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-carousels}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-5-nano-2025-08-07}
      APP_API_KEY: ${APP_API_KEY:-}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    volumes:
      - /tmp/carousel_render:/tmp/carousel_render

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3090}:3000"
    env_file:
      - .env
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
